title: portfolio
description: BANKOLEY Adegniyi Marcelline est une créatrice de mode dont la démarche allie recherche créative et maîtrise technique. Son travail explore les formes, les volumes et les matières, en considérant le vêtement comme un espace d’expression et de sens. Formée en couture et forte d’une expérience dans la réalisation de vêtements, elle développe des projets allant du concept et du moodboard jusqu’au prototype et aux essayages. Actuellement assistante designer à Montréal, elle participe au développement de collections tout en poursuivant l’évolution de sa pratique créative.
theme: jekyll-theme-minimal
